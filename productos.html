<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - K OS GLOW</title>
    
    <link rel="stylesheet" href="styles.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="products-page">

    <a href="index.html" class="home-button-corner" aria-label="Volver al inicio">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffffff" viewBox="0 0 24 24" style="filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.8));">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
    </a>

    <main class="products-container">
        
        <a href="https://keistore.mx" target="_blank" class="product-banner bg-blue">
            <img class="product-img img-left" src="images/kei_merch.webp" alt="Sudadera Kei Merch">
            <h2 class="product-title title-right">KEI MERCH</h2>
        </a>

        <a href="https://kosbeauty.mx" target="_blank" class="product-banner bg-grey">
            <h2 class="product-title title-left">KOSBEAUTY</h2>
            <img class="product-img img-right" src="images/labiales.png" alt="Labiales KOSBEAUTY">
        </a>

        <a href="https://kosessence.com" target="_blank" class="product-banner bg-red">
            <img class="product-img img-left" src="images/muse.png" alt="Perfume K OS Essences">
            <h2 class="product-title title-right">K OS ESSENCES</h2>
        </a>

        <!-- FRANJA 4: K DE KARMA MERCH -->
        <a href="https://keniaos.com/" target="_blank" class="product-banner bg-darkred">
            <h2 class="product-title title-left">K DE KARMA MERCH</h2>
            
            <!-- Imagen 1: Vinilo rojo (Fondo) -->
            <img class="product-img img-kkarma-back" src="images/disco.png" alt="Vinilo K de Karma">
            
            <!-- Imagen 2: Monito con el CD (Frente) -->
            <img class="product-img img-kkarma-front" src="images/mono_karma.png" alt="Mono con CD K de Karma">
        </a>

    </main>

</body>
</html>
